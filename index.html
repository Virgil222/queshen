<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>雀神争霸榜</title>
    <link rel="stylesheet" href="./styles.css?v=20260524-13" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Mahjong Club Dashboard</p>
          <h1>雀神争霸榜</h1>
        </div>
        <div class="hero-card">
          <div class="hero-rank-item">
            <span>当前雀神</span>
            <strong id="topPlayerName">暂无数据</strong>
            <small id="topPlayerMeta">录入一场牌局后生成</small>
          </div>
          <div class="hero-rank-item">
            <span>当前菜鸟</span>
            <strong id="lowPlayerName">暂无数据</strong>
            <small id="lowPlayerMeta">录入一场牌局后生成</small>
          </div>
        </div>
      </section>

      <section class="summary-grid" id="summaryCards"></section>

      <div id="playerModal" class="modal" aria-hidden="true">
        <div class="modal-backdrop" data-close-modal></div>
        <section class="panel modal-card" role="dialog" aria-modal="true" aria-labelledby="playerModalTitle">
          <div class="panel-header">
            <div>
              <p class="section-kicker">Players</p>
              <h2 id="playerModalTitle">玩家管理</h2>
            </div>
            <button class="ghost-button" type="button" data-close-modal>关闭</button>
          </div>
          <form id="playerForm" class="inline-form">
            <input id="playerName" type="text" placeholder="输入朋友昵称，例如：阿强" maxlength="12" />
            <button type="submit">添加玩家</button>
          </form>
          <div class="chip-list" id="playerList"></div>
        </section>
      </div>

      <div id="matchModal" class="modal" aria-hidden="true">
        <div class="modal-backdrop" data-close-modal></div>
        <section class="panel modal-card" role="dialog" aria-modal="true" aria-labelledby="matchModalTitle">
          <div class="panel-header">
            <div>
              <p class="section-kicker">New Match</p>
              <h2 id="matchModalTitle">录入牌局</h2>
            </div>
            <div class="toolbar">
              <button id="quickFillButton" class="ghost-button" type="button">快速填平</button>
              <button class="ghost-button" type="button" data-close-modal>关闭</button>
            </div>
          </div>
          <form id="matchForm" class="match-form">
            <div class="form-grid single">
              <label>
                日期
                <input id="matchDate" type="date" />
              </label>
            </div>
            <div>
              <p class="form-label">选择本局玩家（必须 4 人）</p>
              <div class="participant-entry" id="participantEntry"></div>
            </div>
            <div class="score-entry" id="scoreEntry"></div>
            <p class="balance-tip" id="balanceTip">总积分需要等于 0，才是一局完整结算。</p>
            <button type="submit" class="primary-button">保存牌局</button>
          </form>
        </section>
      </div>

      <section class="panel">
        <div class="panel-header">
          <div>
            <p class="section-kicker">Leaderboard</p>
            <h2>麻友排行榜</h2>
          </div>
          <div class="toolbar">
            <span id="syncStatus" class="sync-status">本地模式</span>
            <button id="exportButton" class="ghost-button" type="button">导出数据</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>排名</th>
                <th>玩家</th>
                <th>总积分</th>
                <th>胜率</th>
                <th>场次</th>
                <th>胜局</th>
                <th>负局</th>
                <th>冠军</th>
                <th>最佳单局</th>
                <th>最差单局</th>
                <th>平均积分</th>
              </tr>
            </thead>
            <tbody id="leaderboardBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <p class="section-kicker">Trend</p>
            <h2>房租走势</h2>
          </div>
        </div>
        <canvas id="trendChart" width="900" height="360"></canvas>
      </section>

      <section class="action-panel">
        <button id="openPlayerModal" class="action-button" type="button">
          <span>Players</span>
          玩家管理
        </button>
        <button id="openMatchModal" class="action-button" type="button">
          <span>New Match</span>
          录入牌局
        </button>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <p class="section-kicker">History</p>
            <h2>牌局记录</h2>
          </div>
        </div>
        <div class="match-list" id="matchList"></div>
      </section>
    </main>

    <template id="emptyStateTemplate">
      <div class="empty-state">
        <strong>还没有数据</strong>
        <span>先添加玩家，再录入每次牌局的积分。</span>
      </div>
    </template>

    <script src="./config.js?v=20260524-13"></script>
    <script src="./app.js?v=20260524-13"></script>
  </body>
</html>
